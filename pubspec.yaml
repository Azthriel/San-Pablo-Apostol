name: eventosspa
description: "San Pablo Apostol."
publish_to: "none"

version: 1.0.4+4

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  intl: ^0.20.2
  pdf: ^3.11.3
  printing: ^5.14.2
  url_launcher: ^6.3.0
  quarks_version_checker:
    git:
      url: https://github.com/quarks-studio/quarks_version_checker
      ref: v1.1.0
  quarks_footer:
    git:
      url: https://github.com/quarks-studio/quarks_footer
      ref: v1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.3"

flutter_launcher_icons:
  image_path: "assets/flor.png"
  web:
    generate: true
    image_path: "assets/flor.png"
    background_color: "#33691E"
    theme_color: "#33691E"

flutter:
  uses-material-design: true
  assets:
    - assets/spa.png
    - assets/back.png